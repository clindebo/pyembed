<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snippet Gallery</title>
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      line-height: 1.6; min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      border-bottom: 1px solid var(--border); background: var(--surface); padding: 16px 0;
    }
    .container { max-width: 860px; margin: 0 auto; padding: 0 24px; }
    .header-inner { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
    .back-link { font-size: 13px; color: var(--accent); text-decoration: none; margin-left: auto; }
    .back-link:hover { text-decoration: underline; }

    /* ── Hero ── */
    .hero { padding: 40px 0 32px; }
    .hero h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .hero p  { font-size: 14px; color: var(--muted); }

    /* ── Grid ── */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px; padding-bottom: 60px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 18px 20px; text-decoration: none; color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; gap: 6px;
    }
    .card:hover { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(88,166,255,0.1); }
    .card-num   { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    .card-title { font-size: 15px; font-weight: 600; }
    .card-desc  { font-size: 13px; color: var(--muted); }
    .card-arrow { font-size: 13px; color: var(--accent); margin-top: auto; padding-top: 10px; }

    /* ── States ── */
    .state { padding: 60px 0; text-align: center; color: var(--muted); font-size: 14px; }
    .state-err { color: #cf222e; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <a class="logo" href="index.html">🐍 Python Snippet Widget</a>
        <a class="back-link" href="index.html">← Back to demo</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="hero">
      <h1 id="cat-name">Loading…</h1>
      <p id="cat-desc"></p>
    </div>
    <div class="grid" id="grid">
      <div class="state" id="state">Loading snippets…</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const catId  = params.get('cat');

    async function load() {
      const state = document.getElementById('state');
      const grid  = document.getElementById('grid');

      if (!catId) {
        document.getElementById('cat-name').textContent = 'All Categories';
        document.getElementById('cat-desc').textContent = 'Choose a category below.';
        // Show category cards
        try {
          const data = await fetch('snippets/index.json').then(r => r.json());
          state.remove();

          // ── Course groups shown as big cards ──────────────────────────
          const COURSE_GROUPS = [
            {
              label:  'DD1310 – Lecture Examples',
              prefix: 'lecture-examples/lecture',
              href:   'lecture.html?course=lectures&n=1'
            },
            {
              label:  'Möbius DD1310',
              prefix: 'mobius-DD1310/lektion',
              href:   'lecture.html?course=mobius-dd1310&n=1'
            },
            {
              label:  'DD1310 Tutorials',
              prefix: 'tutorials-DD1310/tutorial',
              href:   'lecture.html?course=tutorials-dd1310&n=1'
            }
          ];

          for (const group of COURSE_GROUPS) {
            const cats  = data.categories.filter(c => c.folder.startsWith(group.prefix));
            const total = cats.reduce(function(sum, c) { return sum + c.snippets.length; }, 0);
            if (cats.length === 0) continue;
            const a = document.createElement('a');
            a.className = 'card';
            a.href = group.href;
            a.innerHTML = `
              <div class="card-title">${group.label}</div>
              <div class="card-desc">${cats.length} lesson${cats.length !== 1 ? 's' : ''} · ${total} examples</div>
              <div class="card-arrow">Browse →</div>`;
            grid.appendChild(a);
          }

          // ── Other categories (Basic Examples, Möbius Material etc) ────
          const coursePrefixes = COURSE_GROUPS.map(function(g) { return g.prefix; });
          for (const cat of data.categories) {
            const isCourse = coursePrefixes.some(function(p) { return cat.folder.startsWith(p); });
            if (isCourse) continue;
            const a = document.createElement('a');
            a.className = 'card';
            a.href = `gallery.html?cat=${cat.folder}`;
            a.innerHTML = `
              <div class="card-title">${cat.name || cat.label}</div>
              <div class="card-desc">${cat.snippets.length} snippet${cat.snippets.length !== 1 ? 's' : ''}</div>
              <div class="card-arrow">Browse →</div>`;
            grid.appendChild(a);
          }

        } catch(e) {
          state.className = 'state state-err';
          state.textContent = '⚠ Could not load index.json: ' + e.message;
        }
        return;
      }

      try {
        const data = await fetch('snippets/index.json').then(r => r.json());
        const cat  = data.categories.find(c => c.folder === catId);
        if (!cat) throw new Error(`Category "${catId}" not found in index.json`);

        document.title = cat.name + ' — Python Snippet Widget';
        document.getElementById('cat-name').textContent = cat.name;
        document.getElementById('cat-desc').textContent =
          cat.snippets.length + ' snippet' + (cat.snippets.length !== 1 ? 's' : '');

        state.remove();

        // Fetch each snippet's title/description for the card
        await Promise.all(cat.snippets.map(async (s, i) => {
          let title = s.title, desc = '';
          try {
            const sn = await fetch('snippets/' + s.file).then(r => r.json());
            title = sn.title || s.title;
            desc  = sn.description || '';
          } catch(_) {}

          const a = document.createElement('a');
          a.className = 'card';
          a.href = `viewer.html?src=${encodeURIComponent(s.file)}`;
          a.innerHTML = `
            <div class="card-num">#${String(i + 1).padStart(2, '0')}</div>
            <div class="card-title">${title}</div>
            ${desc ? `<div class="card-desc">${desc}</div>` : ''}
            <div class="card-arrow">Open →</div>`;
          grid.appendChild(a);
        }));

      } catch(e) {
        state.className = 'state state-err';
        state.textContent = '⚠ ' + e.message;
      }
    }

    load();
  </script>
</body>
</html>
